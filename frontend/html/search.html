<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수어 연구소 - 수어검색</title>
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/search.css">
</head>
<body class="search-page">
    <header class="main-header">
        <div class="wide-container header-inner">
            <div class="logo" onclick="location.href='home.html'">
                <img src="../logo.png" alt="로고" class="logo-img">
                <span>수어 연구소</span>
            </div>
            <nav class="nav-bar">
                <a href="learning.html">수어학습</a>
                <a href="search.html" class="active">수어검색</a>
                <a href="support.html">고객지원</a>
                <a href="mypage.html">마이페이지</a>
            </nav>
            <button class="login-btn" id="headerAuthBtn">로그인</button>
        </div>
    </header>

    <main class="search-container">
        <section class="search-input-section">
            <div class="search-bar-wrap">
                <input type="text" id="searchInput" placeholder="검색할 단어 또는 문장을 입력하세요.">
                <button id="searchBtn" class="main-search-btn">검색</button>
            </div>
        </section>

        <section class="quick-links-section">
            <div class="recent-search">
                <h4 class="section-sub-title">최근 검색어</h4>
                <div class="tag-list"></div>
            </div>
            <div class="popular-search">
                <h4 class="section-sub-title">인기 검색어</h4>
                <ol class="rank-list"></ol>
            </div>
        </section>

        <hr class="full-divider">

        <!-- 이거 추가 -->
        <p class="click-guide">단어를 클릭하면 한국수어사전에서 영상을 확인할 수 있어요.</p>


        <section class="results-container">
            <div id="results-list" class="result-state"></div>

            <div id="results-none" class="result-state">
                <p class="no-result-msg">사전에 없는 수어입니다.</p>
            </div>
        </section>
    </main>

    <script src="../js/search.js"></script>
</body>
</html>
